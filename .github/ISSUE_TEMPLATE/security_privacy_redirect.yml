name: Security or privacy redirect
description: Use only for public-safe boundary questions. Do not disclose sensitive details.
title: "[Security/Privacy]: public-safe boundary question"
labels:
  - "type: privacy"
  - "area: public-boundary"
  - "status: needs-info"
body:
  - type: markdown
    attributes:
      value: |
        Do not file vulnerabilities, leaked credentials, real personal data, private data, private paths, private hostnames, or suspected privacy-boundary failures as public issues. Use SECURITY.md and GitHub private vulnerability reporting if enabled. Public issues containing sensitive details may be deleted or redacted.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Public-safety confirmation
      options:
        - label: This issue contains no secrets, real personal data, private data, private paths, private hostnames, exploit details, or non-public evidence.
          required: true
  - type: textarea
    id: public_question
    attributes:
      label: Public-safe boundary question
      description: Ask only about public documentation, support scope, or privacy/security process.
    validations:
      required: true
